name: Release

# Build standalone, dependency-free mcp-keep bundles for Windows / macOS / Linux.
# - Push a tag like v1.0.0  → builds, smoke-tests, and attaches per-OS zips to a GitHub Release.
# - Manual run (workflow_dispatch) → builds + smoke-tests only (artifacts on the run, no Release).
#
# Each asset is a zip of a PyInstaller --onedir bundle: a single folder containing the
# mcp-keep binary, its _internal/ runtime, plus FIRST_TIME_SETUP.md + LICENSE. onedir
# (not --onefile) so the binary is a single supervised PID with no extracted child to
# orphan, and FIRST_TIME_SETUP.md must ship alongside it — the setup assistant reads
# that file to wire the client and launch the relay correctly. Without it, a fresh
# download has nothing to set up from.
#
# Windowless on Windows (issue #8): `mcp-keep.exe` is built --noconsole so double-
# clicking / autostart never pops a console window — the relay is driven entirely by
# the AI over MCP, and its logs go to ~/.mcp-keep/keep.log (so no console is needed for
# debugging). macOS/Linux have no console-allocation problem (launchd/systemd, no
# double-click), so they keep the --console build.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write          # needed to create the Release and upload assets

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: mcp-keep-linux-x86_64
            ext: ""
          - os: macos-latest
            asset: mcp-keep-macos-arm64
            ext: ""
          - os: windows-latest
            asset: mcp-keep-windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build onedir bundle (windowless on Windows)
        shell: bash
        run: |
          # Windows exe is --noconsole so no console window ever pops (#8); logs go to
          # ~/.mcp-keep/keep.log instead. macOS/Linux keep --console; they have no
          # GUI-subsystem console to suppress (launchd/systemd, no double-click).
          if [ "${{ runner.os }}" = "Windows" ]; then
            pyinstaller --onedir --name mcp-keep --noconsole python/proxy.py
          else
            pyinstaller --onedir --name mcp-keep --console python/proxy.py
          fi

      - name: Smoke test the built binary
        run: python tests/smoke_binary.py "dist/mcp-keep/mcp-keep${{ matrix.ext }}"

      - name: Bundle docs + zip the onedir folder
        shell: bash
        run: |
          # Ship the onboarding doc + licence inside the folder the user unzips.
          cp FIRST_TIME_SETUP.md LICENSE "dist/mcp-keep/"
          mkdir -p staged
          # Zip so it extracts to a top-level mcp-keep/ folder. Python (already set
          # up) instead of `zip` so it's identical on all three runners.
          python -c "import shutil; shutil.make_archive('staged/${{ matrix.asset }}', 'zip', root_dir='dist', base_dir='mcp-keep')"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: staged/${{ matrix.asset }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
